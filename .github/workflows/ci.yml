name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api:
    name: API (typecheck + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      # Workspaces: install everything from the repo root so @hush/shared is linked.
      - name: Install dependencies
        run: npm ci
        working-directory: .

      # The Prisma client is gitignored (generated/), so it must be produced
      # before the type checker and tests can resolve @prisma/client.
      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type check
        run: npx tsc --noEmit -p tsconfig.json

      - name: Tests
        run: npm test
