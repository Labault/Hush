<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <!-- Brand eclipse: magenta core fading into blue then void -->
    <radialGradient id="eclipse" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="58%" stop-color="#7c8cff"/>
      <stop offset="100%" stop-color="#050816"/>
    </radialGradient>
    <!-- Ambient glow behind the mark -->
    <radialGradient id="ambient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c8cff" stop-opacity="0.32"/>
      <stop offset="45%" stop-color="#a855f7" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#050816" stop-opacity="0"/>
    </radialGradient>
    <!-- Title gradient: white -> blue -> magenta -->
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8e9f0"/>
      <stop offset="50%" stop-color="#a8b3ff"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <!-- CTA / accent line gradient -->
    <linearGradient id="cta" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c8cff"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="vignette" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1224" stop-opacity="0"/>
      <stop offset="100%" stop-color="#020308" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
  </defs>

  <!-- Backdrop -->
  <rect width="1200" height="630" fill="#050816"/>
  <rect width="1200" height="630" fill="url(#vignette)"/>

  <!-- Starfield -->
  <g fill="#a8b3ff">
    <circle cx="120" cy="90" r="1.1" opacity="0.55"/>
    <circle cx="240" cy="180" r="0.9" opacity="0.35"/>
    <circle cx="80" cy="320" r="1.3" opacity="0.5"/>
    <circle cx="180" cy="470" r="0.8" opacity="0.3"/>
    <circle cx="320" cy="540" r="1.0" opacity="0.4"/>
    <circle cx="60" cy="560" r="0.7" opacity="0.25"/>
    <circle cx="1080" cy="70" r="1.0" opacity="0.45"/>
    <circle cx="1140" cy="210" r="1.3" opacity="0.55"/>
    <circle cx="1020" cy="330" r="0.8" opacity="0.3"/>
    <circle cx="1120" cy="470" r="1.1" opacity="0.45"/>
    <circle cx="990" cy="560" r="0.9" opacity="0.35"/>
    <circle cx="1160" cy="540" r="0.7" opacity="0.25"/>
    <circle cx="700" cy="60" r="0.8" opacity="0.3"/>
    <circle cx="540" cy="100" r="0.7" opacity="0.25"/>
  </g>
  <g fill="#c084fc">
    <circle cx="300" cy="120" r="1.0" opacity="0.4"/>
    <circle cx="150" cy="220" r="0.8" opacity="0.3"/>
    <circle cx="1050" cy="150" r="0.9" opacity="0.35"/>
    <circle cx="950" cy="430" r="1.1" opacity="0.4"/>
  </g>

  <!-- Eclipse mark, top-right area -->
  <g transform="translate(905, 250)">
    <circle cx="0" cy="0" r="300" fill="url(#ambient)"/>
    <circle cx="0" cy="0" r="135" fill="url(#eclipse)"/>
    <!-- crescent shadow to read as an eclipse -->
    <circle cx="46" cy="-30" r="125" fill="#050816" opacity="0.55"/>
    <circle cx="0" cy="0" r="135" fill="none" stroke="#c084fc" stroke-opacity="0.25" stroke-width="1.5"/>
  </g>

  <!-- Pill -->
  <g transform="translate(110, 150)">
    <rect x="0" y="0" width="232" height="40" rx="20" fill="rgba(124,140,255,0.06)" stroke="#7c8cff" stroke-opacity="0.25" stroke-width="1"/>
    <circle cx="22" cy="20" r="4" fill="#c084fc"/>
    <text x="40" y="26" font-family="'Inter', system-ui, sans-serif" font-size="14" font-weight="500" letter-spacing="0.5" fill="#a8b3ff">THE ART OF SILENCE</text>
  </g>

  <!-- Title -->
  <text x="106" y="350" font-family="'Inter', system-ui, sans-serif" font-size="190" font-weight="700" letter-spacing="-9" fill="url(#title)" filter="url(#soft)">Hush</text>

  <!-- Tagline -->
  <text x="110" y="420" font-family="'Inter', system-ui, sans-serif" font-size="30" font-weight="400" fill="#8a92b8">Stay silent as long as you can.</text>
  <text x="110" y="462" font-family="'Inter', system-ui, sans-serif" font-size="30" font-weight="400" fill="#5a6190">A timer that climbs while you disappear.</text>

  <!-- Footer: accent line + url + faux timer -->
  <rect x="110" y="528" width="56" height="4" rx="2" fill="url(#cta)"/>
  <text x="110" y="566" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="22" font-weight="500" fill="#a8b3ff" letter-spacing="1">hush.labault.dev</text>

  <text x="1090" y="566" text-anchor="end" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="26" font-weight="500" fill="#7c8cff" letter-spacing="2">00:14:37</text>
</svg>
